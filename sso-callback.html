<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OtterBoard — Signing in…</title>
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_live_Y2xlcmsub3R0ZXJib2FyZC5ubCQ"
    src="https://clerk.otterboard.nl/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
    .box { text-align: center; color: #374151; }
    .logo { font-size: 1.5rem; font-weight: 900; color: #1a56db; margin-bottom: 12px; }
    .logo span { color: #6b7280; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">Otter<span>Board</span></div>
    <div>Signing you in…</div>
  </div>
  <script>
    window.addEventListener('load', async () => {
      for (let i = 0; i < 20 && !window.Clerk; i++) await new Promise(r => setTimeout(r, 300));
      if (!window.Clerk) { window.location.href = '/'; return; }
      await window.Clerk.load();
      await window.Clerk.handleRedirectCallback();
    });
  </script>
</body>
</html>
